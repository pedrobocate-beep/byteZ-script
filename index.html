<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteZ Scripts – Hub de Scripts Lua</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<!-- Icons & Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ─── RESET & VARIABLES ─── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060c;
  --bg2:#0c0c16;
  --bg3:#111122;
  --card:rgba(255,255,255,.03);
  --card-hover:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.06);
  --border-hover:rgba(0,255,136,.25);
  --accent:#00ff88;
  --accent2:#00d4ff;
  --accent3:#7c3aed;
  --danger:#ff4466;
  --text:#e0e0e8;
  --text2:#8888aa;
  --grad:linear-gradient(135deg,#00ff88,#00d4ff);
  --grad2:linear-gradient(135deg,#7c3aed,#00d4ff);
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --radius:12px;
  --radius-sm:8px;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --title:'Rajdhani',sans-serif;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    linear-gradient(rgba(0,255,136,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,.015) 1px,transparent 1px);
  background-size:60px 60px;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
input,textarea{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ─── NAVBAR ─── */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(6,6,12,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:.3s;
}
.navbar.scrolled{background:rgba(6,6,12,.95);box-shadow:0 4px 30px rgba(0,0,0,.5)}
.nav-brand{
  font-family:var(--title);font-size:1.6rem;font-weight:700;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  display:flex;align-items:center;gap:8px;
  user-select:none;
}
.nav-brand i{
  -webkit-text-fill-color:var(--accent);font-size:1.3rem;
  filter:drop-shadow(0 0 8px rgba(0,255,136,.4));
}
.nav-center{flex:1;max-width:420px;margin:0 24px}
.search-box{
  position:relative;width:100%;
}
.search-box input{
  width:100%;padding:10px 16px 10px 40px;
  background:var(--bg3);border:1px solid var(--border);border-radius:50px;
  color:var(--text);font-size:.9rem;transition:.3s;
}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,.1)}
.search-box input::placeholder{color:var(--text2)}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.85rem}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-btn{
  padding:8px 18px;border-radius:50px;font-size:.85rem;font-weight:600;
  transition:.3s;display:flex;align-items:center;gap:6px;
}
.nav-btn-outline{
  background:transparent;border:1px solid var(--border);color:var(--text);
}
.nav-btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn-primary{
  background:var(--grad);color:#000;border:none;
}
.nav-btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,255,136,.3)}
.user-area{display:flex;align-items:center;gap:12px}
.user-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--grad);display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#000;font-size:.85rem;
}
.user-name{font-weight:600;font-size:.9rem;color:var(--accent)}
.nav-btn-danger{
  background:transparent;border:1px solid rgba(255,68,102,.3);color:var(--danger);
}
.nav-btn-danger:hover{background:rgba(255,68,102,.1);border-color:var(--danger)}

/* ─── HERO ─── */
.hero{
  padding:120px 24px 40px;text-align:center;
  position:relative;
}
.hero::after{
  content:'';position:absolute;top:60px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,255,136,.06) 0%,transparent 70%);
  pointer-events:none;
}
.hero h1{
  font-family:var(--title);font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;
  margin-bottom:12px;line-height:1.1;
}
.hero h1 span{
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{color:var(--text2);font-size:1.05rem;max-width:500px;margin:0 auto 30px}
.stats-row{
  display:flex;justify-content:center;gap:40px;flex-wrap:wrap;
}
.stat{text-align:center}
.stat-num{
  font-family:var(--title);font-size:2rem;font-weight:700;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.stat-label{color:var(--text2);font-size:.8rem;text-transform:uppercase;letter-spacing:1px}

/* ─── FILTERS ─── */
.filters{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 24px 20px;flex-wrap:wrap;
}
.filter-btn{
  padding:8px 20px;border-radius:50px;font-size:.85rem;font-weight:500;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  transition:.3s;
}
.filter-btn:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
.filter-btn.active{
  background:var(--grad);color:#000;border-color:transparent;font-weight:600;
  box-shadow:0 4px 20px rgba(0,255,136,.2);
}

/* ─── SCRIPTS GRID ─── */
.container{max-width:1200px;margin:0 auto;padding:0 24px 60px}
.scripts-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:20px;
}
.script-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;transition:.35s;position:relative;overflow:hidden;
  animation:fadeUp .5s ease both;
}
.script-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--grad);opacity:0;transition:.35s;
}
.script-card:hover{
  border-color:var(--border-hover);background:var(--card-hover);
  transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.script-card:hover::before{opacity:1}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-title{
  font-family:var(--title);font-size:1.25rem;font-weight:700;
  color:var(--text);line-height:1.3;flex:1;margin-right:10px;
}
.card-badge{
  padding:3px 10px;border-radius:50px;font-size:.7rem;font-weight:600;
  background:rgba(0,255,136,.1);color:var(--accent);border:1px solid rgba(0,255,136,.2);
  white-space:nowrap;
}
.card-desc{
  color:var(--text2);font-size:.88rem;line-height:1.5;
  margin-bottom:16px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-code{
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:16px;
  font-family:var(--mono);font-size:.78rem;color:var(--accent);
  max-height:80px;overflow:hidden;position:relative;
  line-height:1.5;white-space:pre-wrap;word-break:break-all;
}
.card-code::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(transparent,rgba(0,0,0,.6));
}
.card-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:8px;
}
.card-author{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--text2)}
.card-author i{color:var(--accent3);font-size:.75rem}
.card-date{font-size:.78rem;color:var(--text2)}
.card-stats{display:flex;align-items:center;gap:14px;font-size:.8rem;color:var(--text2)}
.card-stats span{display:flex;align-items:center;gap:4px}
.card-stats i{font-size:.75rem}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}
.action-btn{
  flex:1;min-width:0;padding:10px 12px;border-radius:var(--radius-sm);
  font-size:.82rem;font-weight:600;transition:.3s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-copy{background:rgba(0,255,136,.08);color:var(--accent);border:1px solid rgba(0,255,136,.15)}
.btn-copy:hover{background:rgba(0,255,136,.15);border-color:rgba(0,255,136,.3)}
.btn-view{background:rgba(0,212,255,.08);color:var(--accent2);border:1px solid rgba(0,212,255,.15)}
.btn-view:hover{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.3)}
.btn-like{background:rgba(124,58,237,.08);color:var(--accent3);border:1px solid rgba(124,58,237,.15)}
.btn-like:hover{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3)}
.btn-like.liked{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4);color:#a78bfa}
.btn-delete{background:rgba(255,68,102,.08);color:var(--danger);border:1px solid rgba(255,68,102,.15)}
.btn-delete:hover{background:rgba(255,68,102,.15);border-color:rgba(255,68,102,.3)}

/* ─── EMPTY STATE ─── */
.empty-state{
  text-align:center;padding:80px 20px;
  grid-column:1/-1;
}
.empty-state i{font-size:3rem;color:var(--text2);margin-bottom:16px;opacity:.4}
.empty-state h3{font-family:var(--title);font-size:1.4rem;color:var(--text2);margin-bottom:8px}
.empty-state p{color:var(--text2);font-size:.9rem;opacity:.7}

/* ─── MODALS ─── */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  padding:20px;opacity:0;transition:.3s;
}
.modal-overlay.active{display:flex;opacity:1}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:scale(.95) translateY(20px);transition:.35s;
}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal-lg{max-width:720px}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 28px 0;
}
.modal-header h2{
  font-family:var(--title);font-size:1.5rem;font-weight:700;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.modal-close{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.05);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:.3s;
}
.modal-close:hover{background:rgba(255,68,102,.15);color:var(--danger)}
.modal-body{padding:24px 28px 28px}

/* ─── AUTH TABS ─── */
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.auth-tab{
  flex:1;padding:12px;text-align:center;font-weight:600;font-size:.9rem;
  background:transparent;color:var(--text2);transition:.3s;
}
.auth-tab.active{background:var(--grad);color:#000}
.auth-tab:hover:not(.active){background:rgba(255,255,255,.03)}

/* ─── FORMS ─── */
.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:.85rem;font-weight:600;color:var(--text2);
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;
}
.form-group input,.form-group textarea{
  width:100%;padding:12px 16px;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:.9rem;transition:.3s;
}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
.form-group textarea{resize:vertical;min-height:100px;font-family:var(--mono);font-size:.85rem}
.form-group textarea.code-input{min-height:200px;color:var(--accent);background:rgba(0,0,0,.3)}
.submit-btn{
  width:100%;padding:14px;border-radius:var(--radius-sm);
  background:var(--grad);color:#000;font-size:1rem;font-weight:700;
  transition:.3s;text-transform:uppercase;letter-spacing:1px;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,255,136,.3)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── VIEW SCRIPT MODAL ─── */
.view-title{font-family:var(--title);font-size:1.6rem;font-weight:700;margin-bottom:6px}
.view-meta{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.view-meta span{font-size:.85rem;color:var(--text2);display:flex;align-items:center;gap:5px}
.view-meta i{font-size:.8rem}
.view-desc{color:var(--text2);font-size:.92rem;line-height:1.6;margin-bottom:20px}
.view-code-block{
  background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:20px;font-family:var(--mono);font-size:.82rem;
  color:var(--accent);line-height:1.6;
  max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
  position:relative;
}
.view-code-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
}
.view-code-header span{font-family:var(--title);font-size:.95rem;color:var(--text2);font-weight:600}
.view-actions{display:flex;gap:10px;margin-top:20px}
.view-actions .action-btn{flex:unset;padding:12px 24px}

/* ─── TOAST ─── */
.toast-container{
  position:fixed;bottom:24px;right:24px;z-index:3000;
  display:flex;flex-direction:column;gap:10px;
}
.toast{
  padding:14px 22px;border-radius:var(--radius-sm);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:.88rem;font-weight:500;
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:10px;
  animation:slideIn .35s ease;min-width:280px;
}
.toast.success{border-color:rgba(0,255,136,.3)}
.toast.success i{color:var(--accent)}
.toast.error{border-color:rgba(255,68,102,.3)}
.toast.error i{color:var(--danger)}
.toast.info{border-color:rgba(0,212,255,.3)}
.toast.info i{color:var(--accent2)}

/* ─── LOADING ─── */
.loader{
  display:flex;justify-content:center;padding:60px;grid-column:1/-1;
}
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes slideIn{
  from{opacity:0;transform:translateX(60px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .navbar{padding:0 14px;gap:8px}
  .nav-center{max-width:none;margin:0 10px;flex:1}
  .nav-right{gap:6px}
  .nav-btn span.btn-text{display:none}
  .nav-btn{padding:8px 12px}
  .user-name{display:none}
  .hero h1{font-size:1.8rem}
  .scripts-grid{grid-template-columns:1fr}
  .modal{margin:10px;max-height:95vh}
  .stats-row{gap:20px}
  .view-actions{flex-direction:column}
  .view-actions .action-btn{flex:1}
}
@media(max-width:480px){
  .hero{padding:100px 16px 30px}
  .container{padding:0 12px 40px}
  .script-card{padding:18px}
  .card-actions{flex-direction:column}
  .action-btn{flex:unset}
}
</style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar" id="navbar">
  <a href="#" class="nav-brand" onclick="resetFilters()">
    <i class="fa-solid fa-terminal"></i>
    ByteZ Scripts
  </a>
  <div class="nav-center">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Buscar scripts..." oninput="handleSearch()">
    </div>
  </div>
  <div class="nav-right" id="navRight"></div>
</nav>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <h1>Explore os melhores<br><span>Scripts Lua</span></h1>
  <p>Encontre, compartilhe e copie scripts para seus projetos. Comunidade aberta para todos.</p>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="totalScripts">0</div>
      <div class="stat-label">Scripts</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="totalLikes">0</div>
      <div class="stat-label">Curtidas</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="totalViews">0</div>
      <div class="stat-label">Visualizações</div>
    </div>
  </div>
</section>

<!-- ═══ FILTERS ═══ -->
<div class="filters" id="filtersBar">
  <button class="filter-btn active" data-filter="recent" onclick="setFilter('recent')">
    <i class="fa-solid fa-clock"></i> Recentes
  </button>
  <button class="filter-btn" data-filter="popular" onclick="setFilter('popular')">
    <i class="fa-solid fa-fire"></i> Populares
  </button>
  <button class="filter-btn" data-filter="most-viewed" onclick="setFilter('most-viewed')">
    <i class="fa-solid fa-eye"></i> Mais Vistos
  </button>
  <button class="filter-btn" data-filter="mine" onclick="setFilter('mine')" id="filterMine" style="display:none">
    <i class="fa-solid fa-user"></i> Meus Scripts
  </button>
</div>

<!-- ═══ SCRIPTS GRID ═══ -->
<div class="container">
  <div class="scripts-grid" id="scriptsGrid">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>

<!-- ═══ AUTH MODAL ═══ -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="authTitle">Entrar</h2>
      <button class="modal-close" onclick="closeModal('authModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Cadastro</button>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
      </form>
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Nome de Usuário</label>
          <input type="text" id="regUsername" placeholder="ByteZMaster" required minlength="3" maxlength="20">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <button type="submit" class="submit-btn" id="regBtn">
          <i class="fa-solid fa-user-plus"></i> Criar Conta
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ═══ POST SCRIPT MODAL ═══ -->
<div class="modal-overlay" id="postModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2><i class="fa-solid fa-plus"></i> Novo Script</h2>
      <button class="modal-close" onclick="closeModal('postModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <form id="postForm" onsubmit="handlePost(event)">
        <div class="form-group">
          <label>Título</label>
          <input type="text" id="postTitle" placeholder="Ex: Infinite Yield Script" required maxlength="80">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="postDesc" placeholder="Breve descrição do que o script faz" required maxlength="200">
        </div>
        <div class="form-group">
          <label>Código Lua</label>
          <textarea id="postCode" class="code-input" placeholder='loadstring(game:HttpGet("https://..."))()' required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="postBtn">
          <i class="fa-solid fa-paper-plane"></i> Publicar Script
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ═══ VIEW SCRIPT MODAL ═══ -->
<div class="modal-overlay" id="viewModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2><i class="fa-solid fa-code"></i> Script</h2>
      <button class="modal-close" onclick="closeModal('viewModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="viewBody"></div>
  </div>
</div>

<!-- ═══ TOASTS ═══ -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════
//  FIREBASE INIT
// ═══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDbmJbhYLofmkF99TwhF_skc_iAnwBTNPY",
  authDomain: "bytez-script.firebaseapp.com",
  projectId: "bytez-script",
  storageBucket: "bytez-script.firebasestorage.app",
  messagingSenderId: "716754895227",
  appId: "1:716754895227:web:f661b3dbfd25df9b6bfdde"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentUser = null;
let currentUsername = '';
let allScripts = [];
let currentFilter = 'recent';
let searchQuery = '';

// ═══════════════════════════════════════
//  AUTH STATE
// ═══════════════════════════════════════
auth.onAuthStateChanged(async function(user) {
  currentUser = user;
  if (user) {
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      currentUsername = doc.exists ? doc.data().username : user.email.split('@')[0];
    } catch(e) {
      currentUsername = user.email.split('@')[0];
    }
  } else {
    currentUsername = '';
  }
  renderNav();
  loadScripts();
});

// ═══════════════════════════════════════
//  RENDER NAVBAR
// ═══════════════════════════════════════
function renderNav() {
  var nav = document.getElementById('navRight');
  var filterMine = document.getElementById('filterMine');

  if (currentUser) {
    var initial = currentUsername.charAt(0).toUpperCase();
    nav.innerHTML =
      '<div class="user-area">' +
        '<div class="user-avatar">' + initial + '</div>' +
        '<span class="user-name">' + currentUsername + '</span>' +
      '</div>' +
      '<button class="nav-btn nav-btn-primary" onclick="openModal(\'postModal\')">' +
        '<i class="fa-solid fa-plus"></i><span class="btn-text">Novo Script</span>' +
      '</button>' +
      '<button class="nav-btn nav-btn-danger" onclick="handleLogout()">' +
        '<i class="fa-solid fa-right-from-bracket"></i>' +
      '</button>';
    filterMine.style.display = '';
  } else {
    nav.innerHTML =
      '<button class="nav-btn nav-btn-outline" onclick="openModal(\'authModal\')">' +
        '<i class="fa-solid fa-right-to-bracket"></i><span class="btn-text">Entrar</span>' +
      '</button>' +
      '<button class="nav-btn nav-btn-primary" onclick="openAuthRegister()">' +
        '<i class="fa-solid fa-user-plus"></i><span class="btn-text">Cadastro</span>' +
      '</button>';
    filterMine.style.display = 'none';
    if (currentFilter === 'mine') setFilter('recent');
  }
}

// ═══════════════════════════════════════
//  AUTH FUNCTIONS
// ═══════════════════════════════════════
function switchAuthTab(tab) {
  var loginForm = document.getElementById('loginForm');
  var regForm = document.getElementById('registerForm');
  var tabL = document.getElementById('tabLogin');
  var tabR = document.getElementById('tabRegister');
  var title = document.getElementById('authTitle');

  if (tab === 'login') {
    loginForm.style.display = '';
    regForm.style.display = 'none';
    tabL.classList.add('active');
    tabR.classList.remove('active');
    title.textContent = 'Entrar';
  } else {
    loginForm.style.display = 'none';
    regForm.style.display = '';
    tabR.classList.add('active');
    tabL.classList.remove('active');
    title.textContent = 'Criar Conta';
  }
}

function openAuthRegister() {
  openModal('authModal');
  switchAuthTab('register');
}

async function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPassword').value;
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    toast('Login realizado com sucesso!', 'success');
    closeModal('authModal');
    document.getElementById('loginForm').reset();
  } catch (err) {
    toast(firebaseError(err.code), 'error');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
}

async function handleRegister(e) {
  e.preventDefault();
  var btn = document.getElementById('regBtn');
  var username = document.getElementById('regUsername').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var pass = document.getElementById('regPassword').value;

  if (username.length < 3) { toast('Nome deve ter pelo menos 3 caracteres.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Criando...';
  try {
    var cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({
      username: username,
      email: email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('Conta criada! Bem-vindo, ' + username, 'success');
    closeModal('authModal');
    document.getElementById('registerForm').reset();
  } catch (err) {
    toast(firebaseError(err.code), 'error');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Criar Conta';
}

async function handleLogout() {
  await auth.signOut();
  toast('Você saiu da conta.', 'info');
}

function firebaseError(code) {
  var map = {
    'auth/user-not-found': 'Usuário não encontrado.',
    'auth/wrong-password': 'Senha incorreta.',
    'auth/email-already-in-use': 'Este email já está em uso.',
    'auth/weak-password': 'Senha deve ter pelo menos 6 caracteres.',
    'auth/invalid-email': 'Email inválido.',
    'auth/too-many-requests': 'Muitas tentativas. Tente depois.',
    'auth/invalid-credential': 'Credenciais inválidas.'
  };
  return map[code] || 'Ocorreu um erro. Tente novamente.';
}

// ═══════════════════════════════════════
//  SCRIPTS — LOAD
// ═══════════════════════════════════════
async function loadScripts() {
  var grid = document.getElementById('scriptsGrid');
  grid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  try {
    var query = db.collection('scripts');

    if (currentFilter === 'popular') {
      query = query.orderBy('likes', 'desc');
    } else if (currentFilter === 'most-viewed') {
      query = query.orderBy('views', 'desc');
    } else {
      query = query.orderBy('createdAt', 'desc');
    }

    var snap = await query.limit(100).get();
    allScripts = [];
    snap.forEach(function(doc) {
      allScripts.push({ id: doc.id, ...doc.data() });
    });

    updateStats();
    renderScripts();
  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>' +
      '<h3>Erro ao carregar</h3><p>' + err.message + '</p></div>';
  }
}

function updateStats() {
  var totalLikes = 0, totalViews = 0;
  allScripts.forEach(function(s) {
    totalLikes += s.likes || 0;
    totalViews += s.views || 0;
  });
  document.getElementById('totalScripts').textContent = allScripts.length;
  document.getElementById('totalLikes').textContent = totalLikes;
  document.getElementById('totalViews').textContent = totalViews;
}

// ═══════════════════════════════════════
//  SCRIPTS — RENDER
// ═══════════════════════════════════════
function renderScripts() {
  var grid = document.getElementById('scriptsGrid');
  var list = allScripts.slice();

  if (currentFilter === 'mine' && currentUser) {
    list = list.filter(function(s) { return s.authorId === currentUser.uid; });
  }

  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    list = list.filter(function(s) {
      return (s.title || '').toLowerCase().indexOf(q) !== -1 ||
             (s.description || '').toLowerCase().indexOf(q) !== -1 ||
             (s.author || '').toLowerCase().indexOf(q) !== -1;
    });
  }

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state">' +
      '<i class="fa-solid fa-folder-open"></i>' +
      '<h3>Nenhum script encontrado</h3>' +
      '<p>' + (searchQuery ? 'Tente outra busca.' : 'Seja o primeiro a publicar!') + '</p></div>';
    return;
  }

  var html = '';
  list.forEach(function(s, i) {
    var date = s.createdAt ? formatDate(s.createdAt) : '—';
    var liked = currentUser && s.likedBy && s.likedBy.indexOf(currentUser.uid) !== -1;
    var isOwner = currentUser && s.authorId === currentUser.uid;
    var codePreview = escapeHtml((s.code || '').substring(0, 150));

    html += '<div class="script-card" style="animation-delay:' + (i * 0.06) + 's">' +
      '<div class="card-header">' +
        '<div class="card-title">' + escapeHtml(s.title) + '</div>' +
        '<div class="card-badge">LUA</div>' +
      '</div>' +
      '<div class="card-desc">' + escapeHtml(s.description) + '</div>' +
      '<div class="card-code">' + codePreview + '</div>' +
      '<div class="card-meta">' +
        '<div>' +
          '<span class="card-author"><i class="fa-solid fa-user"></i> ' + escapeHtml(s.author) + '</span>' +
          '<span class="card-date" style="margin-left:12px"><i class="fa-regular fa-calendar"></i> ' + date + '</span>' +
        '</div>' +
        '<div class="card-stats">' +
          '<span><i class="fa-solid fa-eye"></i> ' + (s.views || 0) + '</span>' +
          '<span><i class="fa-solid fa-heart"></i> ' + (s.likes || 0) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="action-btn btn-copy" onclick="copyScript(\'' + s.id + '\')">' +
          '<i class="fa-regular fa-copy"></i> Copiar</button>' +
        '<button class="action-btn btn-view" onclick="viewScript(\'' + s.id + '\')">' +
          '<i class="fa-solid fa-expand"></i> Ver</button>' +
        '<button class="action-btn btn-like ' + (liked ? 'liked' : '') + '" onclick="toggleLike(\'' + s.id + '\')">' +
          '<i class="fa-solid fa-heart"></i> ' + (s.likes || 0) + '</button>' +
        (isOwner ? '<button class="action-btn btn-delete" onclick="deleteScript(\'' + s.id + '\')">' +
          '<i class="fa-solid fa-trash"></i></button>' : '') +
      '</div>' +
    '</div>';
  });

  grid.innerHTML = html;
}

// ═══════════════════════════════════════
//  SCRIPTS — POST
// ═══════════════════════════════════════
async function handlePost(e) {
  e.preventDefault();
  if (!currentUser) { toast('Faça login para postar.', 'error'); return; }

  var btn = document.getElementById('postBtn');
  var title = document.getElementById('postTitle').value.trim();
  var desc  = document.getElementById('postDesc').value.trim();
  var code  = document.getElementById('postCode').value;

  if (!title || !desc || !code) { toast('Preencha todos os campos.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Publicando...';

  try {
    await db.collection('scripts').add({
      title: title,
      description: desc,
      code: code,
      author: currentUsername,
      authorId: currentUser.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      views: 0,
      likes: 0,
      likedBy: []
    });
    toast('Script publicado com sucesso!', 'success');
    closeModal('postModal');
    document.getElementById('postForm').reset();
    loadScripts();
  } catch (err) {
    toast('Erro ao publicar: ' + err.message, 'error');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Publicar Script';
}

// ═══════════════════════════════════════
//  SCRIPTS — COPY
// ═══════════════════════════════════════
function copyScript(id) {
  var script = allScripts.find(function(s) { return s.id === id; });
  if (!script) return;
  navigator.clipboard.writeText(script.code).then(function() {
    toast('Script copiado!', 'success');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = script.code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Script copiado!', 'success');
  });
}

// ═══════════════════════════════════════
//  SCRIPTS — VIEW
// ═══════════════════════════════════════
async function viewScript(id) {
  var script = allScripts.find(function(s) { return s.id === id; });
  if (!script) return;

  try {
    await db.collection('scripts').doc(id).update({
      views: firebase.firestore.FieldValue.increment(1)
    });
    script.views = (script.views || 0) + 1;
    updateStats();
  } catch(e) { /* ok */ }

  var date = script.createdAt ? formatDate(script.createdAt) : '—';
  var liked = currentUser && script.likedBy && script.likedBy.indexOf(currentUser.uid) !== -1;

  document.getElementById('viewBody').innerHTML =
    '<div class="view-title">' + escapeHtml(script.title) + '</div>' +
    '<div class="view-meta">' +
      '<span><i class="fa-solid fa-user" style="color:var(--accent3)"></i> ' + escapeHtml(script.author) + '</span>' +
      '<span><i class="fa-regular fa-calendar"></i> ' + date + '</span>' +
      '<span><i class="fa-solid fa-eye" style="color:var(--accent2)"></i> ' + (script.views || 0) + ' views</span>' +
      '<span><i class="fa-solid fa-heart" style="color:var(--danger)"></i> ' + (script.likes || 0) + ' likes</span>' +
    '</div>' +
    '<div class="view-desc">' + escapeHtml(script.description) + '</div>' +
    '<div class="view-code-header">' +
      '<span><i class="fa-solid fa-code"></i> Código Lua</span>' +
      '<button class="action-btn btn-copy" onclick="copyScript(\'' + script.id + '\')" style="flex:unset;padding:6px 14px;font-size:.8rem">' +
        '<i class="fa-regular fa-copy"></i> Copiar</button>' +
    '</div>' +
    '<div class="view-code-block">' + escapeHtml(script.code) + '</div>' +
    '<div class="view-actions">' +
      '<button class="action-btn btn-like ' + (liked ? 'liked' : '') + '" onclick="toggleLike(\'' + script.id + '\');setTimeout(function(){viewScript(\'' + script.id + '\')},500)">' +
        '<i class="fa-solid fa-heart"></i> ' + (liked ? 'Descurtir' : 'Curtir') + ' (' + (script.likes || 0) + ')</button>' +
      '<button class="action-btn btn-copy" onclick="copyScript(\'' + script.id + '\')">' +
        '<i class="fa-regular fa-copy"></i> Copiar Script</button>' +
    '</div>';

  openModal('viewModal');
}

// ═══════════════════════════════════════
//  SCRIPTS — LIKE
// ═══════════════════════════════════════
async function toggleLike(id) {
  if (!currentUser) { toast('Faça login para curtir.', 'error'); return; }

  var script = allScripts.find(function(s) { return s.id === id; });
  if (!script) return;

  var likedBy = script.likedBy || [];
  var hasLiked = likedBy.indexOf(currentUser.uid) !== -1;

  try {
    if (hasLiked) {
      await db.collection('scripts').doc(id).update({
        likes: firebase.firestore.FieldValue.increment(-1),
        likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      });
      script.likes = Math.max(0, (script.likes || 0) - 1);
      script.likedBy = likedBy.filter(function(uid) { return uid !== currentUser.uid; });
    } else {
      await db.collection('scripts').doc(id).update({
        likes: firebase.firestore.FieldValue.increment(1),
        likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
      });
      script.likes = (script.likes || 0) + 1;
      script.likedBy = likedBy.concat([currentUser.uid]);
    }
    updateStats();
    renderScripts();
  } catch (err) {
    toast('Erro ao curtir.', 'error');
  }
}

// ═══════════════════════════════════════
//  SCRIPTS — DELETE
// ═══════════════════════════════════════
async function deleteScript(id) {
  if (!currentUser) return;
  if (!confirm('Tem certeza que deseja deletar este script?')) return;

  try {
    await db.collection('scripts').doc(id).delete();
    toast('Script deletado.', 'info');
    allScripts = allScripts.filter(function(s) { return s.id !== id; });
    updateStats();
    renderScripts();
  } catch (err) {
    toast('Erro ao deletar: ' + err.message, 'error');
  }
}

// ═══════════════════════════════════════
//  FILTERS & SEARCH
// ═══════════════════════════════════════
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  loadScripts();
}

function resetFilters() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  setFilter('recent');
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  renderScripts();
}

// ═══════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════
function openModal(id) {
  var el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(function() { el.classList.add('active'); });
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  var el = document.getElementById(id);
  el.classList.remove('active');
  setTimeout(function() { el.style.display = 'none'; }, 300);
  document.body.style.overflow = '';
}

document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var icons = { success: 'fa-check-circle', error: 'fa-circle-xmark', info: 'fa-circle-info' };
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + '"></i> ' + msg;
  container.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; el.style.transform = 'translateX(60px)'; el.style.transition = '.3s'; }, 3500);
  setTimeout(function() { el.remove(); }, 3800);
}

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function escapeHtml(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatDate(ts) {
  if (!ts) return '—';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}

window.addEventListener('scroll', function() {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
});
</script>
