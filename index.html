<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteZ Scripts | Roblox Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #16161e;
            --primary: #8a2be2;
            --primary-hover: #a04ef6;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --accent: #00f2ff;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            line-height: 1.6;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(22, 22, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2d2d3d;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; cursor: pointer; }
        .logo span { color: var(--primary); }

        .search-container { flex: 0 1 400px; margin: 0 20px; }
        .search-container input {
            width: 100%;
            padding: 10px 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(138, 43, 226, 0.3); }

        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { font-weight: 600; color: var(--accent); font-size: 14px; }

        /* Main Content */
        main { padding: 40px 8%; max-width: 1400px; margin: 0 auto; }

        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { color: var(--text-dim); }

        .btn-post {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s transform;
        }
        .btn-post:hover { transform: scale(1.05); background: var(--primary-hover); }

        /* Scripts Grid */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .script-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d2d3d;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            position: relative;
        }
        .script-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .script-header h3 { margin-bottom: 5px; color: var(--primary); }
        .script-desc { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; height: 45px; overflow: hidden; }

        .code-preview {
            background: #000;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #00ffaa;
            margin-bottom: 15px;
            border-left: 3px solid var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #2d2d3d;
        }

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .btn-copy { background: #333; color: white; }
        .btn-copy:hover { background: #444; }
        .btn-del { background: rgba(255, 77, 77, 0.1); color: var(--danger); max-width: 40px; }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            position: relative;
        }
        .modal-content h2 { margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        .modal-content textarea { height: 100px; resize: none; }
        .modal-content .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">ByteZ<span>Scripts</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Procurar scripts por título...">
        </div>
        <div class="user-info" id="authBox">
            <button onclick="toggleModal('loginModal', true)" class="btn-post" style="margin-top:0">Entrar</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>O Futuro dos Scripts</h1>
            <p>Compartilhe e descubra os melhores códigos Lua para Roblox.</p>
            <button id="mainPostBtn" class="btn-post" style="display:none" onclick="toggleModal('postModal', true)">
                <i class="fas fa-plus"></i> Publicar Novo Script
            </button>
        </section>

        <div class="scripts-grid" id="scriptsGrid">
            </div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('loginModal', false)">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="password" placeholder="Sua senha">
            <button class="btn-submit" id="authBtn" onclick="handleAuth()">Entrar</button>
            <p style="text-align:center; margin-top:15px; font-size:13px; color:#888; cursor:pointer" onclick="switchAuthMode()">
                Ainda não tem conta? <span style="color:var(--primary)">Cadastre-se</span>
            </p>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('postModal', false)">&times;</span>
            <h2>Postar Script</h2>
            <input type="text" id="scriptTitle" placeholder="Título do Script (ex: Fly Hub)">
            <textarea id="scriptDesc" placeholder="Breve descrição do que o script faz..."></textarea>
            <textarea id="scriptCode" placeholder="loadstring(game:HttpGet(...))()" style="height:150px; font-family:monospace; color:#00ffaa"></textarea>
            <button class="btn-submit" onclick="submitScript()">Publicar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmJbhYLofmkF99TwhF_skc_iAnwBTNPY",
            authDomain: "bytez-script.firebaseapp.com",
            projectId: "bytez-script",
            storageBucket: "bytez-script.firebasestorage.app",
            messagingSenderId: "716754895227",
            appId: "1:716754895227:web:f661b3dbfd25df9b6bfdde"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;
        let currentUser = null;

        // --- Gerenciamento de UI e Modais ---
        window.toggleModal = (id, show) => {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        window.switchAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('modalTitle').innerText = isLoginMode ? 'Login' : 'Cadastro';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Entrar' : 'Criar Conta';
        }

        // --- Autenticação ---
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
                toggleModal('loginModal', false);
            } catch (error) {
                alert("Erro: " + error.message);
            }
        }

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authBox = document.getElementById('authBox');
            const postBtn = document.getElementById('mainPostBtn');

            if (user) {
                const username = user.email.split('@')[0];
                authBox.innerHTML = `
                    <span class="user-name"><i class="fas fa-user"></i> ${username}</span>
                    <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer">Sair</button>
                `;
                postBtn.style.display = 'inline-block';
            } else {
                authBox.innerHTML = `<button onclick="toggleModal('loginModal', true)" class="btn-post" style="margin-top:0">Entrar</button>`;
                postBtn.style.display = 'none';
            }
        });

        // --- Operações com Scripts ---
        window.submitScript = async () => {
            const title = document.getElementById('scriptTitle').value;
            const desc = document.getElementById('scriptDesc').value;
            const code = document.getElementById('scriptCode').value;

            if (!title || !code) return alert("Título e código são obrigatórios!");

            try {
                await addDoc(collection(db, "scripts"), {
                    title,
                    desc,
                    code,
                    author: currentUser.email.split('@')[0],
                    authorId: currentUser.uid,
                    date: new Date().toLocaleDateString('pt-BR'),
                    timestamp: Date.now()
                });
                toggleModal('postModal', false);
                // Limpar campos
                document.getElementById('scriptTitle').value = '';
                document.getElementById('scriptDesc').value = '';
                document.getElementById('scriptCode').value = '';
            } catch (e) {
                alert("Erro ao postar: " + e.message);
            }
        }

        window.copyScript = (btn, codeBase64) => {
            const code = atob(codeBase64);
            navigator.clipboard.writeText(code);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copiado!';
            btn.style.color = 'var(--accent)';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.color = 'white';
            }, 2000);
        }

        window.deleteScript = async (id) => {
            if (confirm("Deseja realmente deletar este script?")) {
                await deleteDoc(doc(db, "scripts", id));
            }
        }

        // --- Escuta de Dados em Tempo Real ---
        const q = query(collection(db, "scripts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('scriptsGrid');
            grid.innerHTML = '';

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const isOwner = currentUser && currentUser.uid === data.authorId;
                
                // Usamos b64 para evitar quebra de strings no HTML
                const safeCode = btoa(data.code);

                grid.innerHTML += `
                    <div class="script-card">
                        <div class="script-header">
                            <h3>${data.title}</h3>
                        </div>
                        <p class="script-desc">${data.desc || 'Sem descrição.'}</p>
                        <div class="code-preview">${data.code}</div>
                        <div class="card-stats">
                            <span><i class="fas fa-user-edit"></i> ${data.author}</span>
                            <span><i class="fas fa-calendar-alt"></i> ${data.date}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-action btn-copy" onclick="copyScript(this, '${safeCode}')">
                                <i class="fas fa-copy"></i> Copiar Script
                            </button>
                            ${isOwner ? `
                                <button class="btn-action btn-del" onclick="deleteScript('${id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
        });

        // Busca Simples
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.script-card');
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
