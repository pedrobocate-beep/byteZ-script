<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteZ Scripts Hub | Online</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0d0d0f;
            --card: #16161a;
            --primary: #8a2be2;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Navbar */
        header {
            background: rgba(22, 22, 26, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d35;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--text); cursor: pointer; }
        .logo span { color: var(--primary); }

        .auth-controls { display: flex; align-items: center; gap: 15px; }
        .user-tag { font-size: 14px; color: var(--accent); font-weight: 500; }

        /* Botões */
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #7a1fd1; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: white; }
        .btn-logout { background: transparent; color: var(--danger); border: none; font-size: 13px; }

        /* Grid de Scripts */
        main { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .search-area { margin-bottom: 40px; text-align: center; }
        .search-area input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            background: #000;
            border: 1px solid #333;
            border-radius: 25px;
            color: white;
            font-size: 16px;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Card do Script */
        .script-card {
            background: var(--card);
            border: 1px solid #2d2d35;
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
        }
        .script-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .script-card h3 { color: var(--primary); margin-bottom: 8px; }
        .script-card p { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; height: 40px; overflow: hidden; }
        
        .code-snippet {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 15px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #2d2d35;
            padding-top: 15px;
        }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--primary);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #333;
            cursor: pointer;
        }
        .delete-btn:hover { color: var(--danger); }

    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">ByteZ<span>Hub</span></div>
        <div class="auth-controls" id="authUI">
            <button class="btn btn-primary" onclick="openModal('loginModal')">Entrar</button>
        </div>
    </header>

    <main>
        <div class="search-area">
            <h1>Scripts Comunitários</h1>
            <p style="color: var(--text-dim); margin-bottom: 20px;">Explore scripts postados por outros usuários ou poste o seu.</p>
            <input type="text" id="searchInput" placeholder="Pesquisar por nome do script...">
            <br>
            <button id="postBtn" class="btn btn-primary" style="display:none; margin-top: 20px;" onclick="openModal('postModal')">
                <i class="fas fa-plus"></i> Postar Novo Script
            </button>
        </div>

        <div class="scripts-grid" id="scriptsGrid">
            </div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Login / Cadastro</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn btn-primary" style="width: 100%;" onclick="handleAuth()">Confirmar</button>
            <button class="btn btn-logout" style="width: 100%; margin-top: 10px;" onclick="closeModal('loginModal')">Cancelar</button>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Publicar Script</h2>
            <input type="text" id="scriptTitle" placeholder="Título (ex: Auto Farm Blox Fruits)">
            <textarea id="scriptDesc" placeholder="Descrição rápida..."></textarea>
            <textarea id="scriptCode" placeholder="Cole o código LUA aqui..." style="height: 150px; font-family: monospace;"></textarea>
            <button class="btn btn-primary" style="width: 100%;" onclick="saveScript()">Publicar Online</button>
            <button class="btn btn-logout" style="width: 100%; margin-top: 10px;" onclick="closeModal('postModal')">Fechar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // Sua configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDbmJbhYLofmkF99TwhF_skc_iAnwBTNPY",
            authDomain: "bytez-script.firebaseapp.com",
            projectId: "bytez-script",
            storageBucket: "bytez-script.firebasestorage.app",
            messagingSenderId: "716754895227",
            appId: "1:716754895227:web:f661b3dbfd25df9b6bfdde"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userLogado = null;

        // --- FUNÇÕES DE INTERFACE ---
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        // --- AUTENTICAÇÃO ---
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                // Tenta logar, se não conseguir, tenta criar conta (simplificado)
                await signInWithEmailAndPassword(auth, email, pass).catch(() => {
                    return createUserWithEmailAndPassword(auth, email, pass);
                });
                closeModal('loginModal');
            } catch (e) { alert("Erro: " + e.message); }
        };

        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authUI = document.getElementById('authUI');
            const postBtn = document.getElementById('postBtn');
            userLogado = user;

            if (user) {
                authUI.innerHTML = `
                    <span class="user-tag"><i class="fas fa-user"></i> ${user.email.split('@')[0]}</span>
                    <button class="btn-logout" onclick="sair()">Sair</button>
                `;
                postBtn.style.display = 'block';
            } else {
                authUI.innerHTML = `<button class="btn btn-primary" onclick="openModal('loginModal')">Entrar</button>`;
                postBtn.style.display = 'none';
            }
        });

        // --- BANCO DE DADOS (Firestore) ---

        // 1. Salvar novo script
        window.saveScript = async () => {
            const title = document.getElementById('scriptTitle').value;
            const desc = document.getElementById('scriptDesc').value;
            const code = document.getElementById('scriptCode').value;

            if (!title || !code) return alert("Preencha o título e o código!");

            try {
                await addDoc(collection(db, "scripts"), {
                    title: title,
                    desc: desc,
                    code: code,
                    author: userLogado.email.split('@')[0],
                    authorId: userLogado.uid,
                    createdAt: Date.now()
                });
                
                // Limpar e fechar
                document.getElementById('scriptTitle').value = '';
                document.getElementById('scriptDesc').value = '';
                document.getElementById('scriptCode').value = '';
                closeModal('postModal');
                alert("Script publicado com sucesso!");
            } catch (e) { alert("Erro ao salvar: " + e.message); }
        };

        // 2. Deletar script (só o dono pode)
        window.apagarScript = async (id) => {
            if (confirm("Deseja apagar este script permanentemente?")) {
                await deleteDoc(doc(db, "scripts", id));
            }
        };

        // 3. Copiar Script
        window.copiar = (text) => {
            navigator.clipboard.writeText(text);
            alert("Script copiado para a área de transferência!");
        };

        // 4. Carregar scripts do banco em tempo real
        const q = query(collection(db, "scripts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('scriptsGrid');
            grid.innerHTML = ''; // Limpa a tela para atualizar

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const eDono = userLogado && userLogado.uid === data.authorId;

                grid.innerHTML += `
                    <div class="script-card">
                        ${eDono ? `<button class="delete-btn" onclick="apagarScript('${id}')"><i class="fas fa-trash"></i></button>` : ''}
                        <h3>${data.title}</h3>
                        <p>${data.desc || 'Sem descrição.'}</p>
                        <div class="code-snippet">${data.code}</div>
                        <button class="btn btn-outline" style="width:100%" onclick="copiar(\`${data.code}\`)">
                            <i class="fas fa-copy"></i> Copiar Script
                        </button>
                        <div class="card-footer">
                            <span><i class="fas fa-user-circle"></i> ${data.author}</span>
                            <span>${new Date(data.createdAt).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
            });
        });

        // 5. Filtro de Busca
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.script-card');
            cards.forEach(card => {
                const titulo = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = titulo.includes(termo) ? 'block' : 'none';
            });
        });

    </script>
</body>
</html>
